spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://localhost:5433/studyflow_db
    username: studyflow_user
    password: secretpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:studyflow-local-dev-secret-key-must-be-at-least-32-characters}
    expiration-ms: 86400000

studyflow:
  ai:
    planning:
      provider: ${STUDYFLOW_AI_PLANNING_PROVIDER:mock}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-3.5-flash}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:60}
