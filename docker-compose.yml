services:
  postgres-db:
    image: postgres:15-alpine
    container_name: studyflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-studyflow_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyflow_user} -d ${POSTGRES_DB:-studyflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_storage:
