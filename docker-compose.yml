version: '3.8'
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: studyflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
      - ./database/init-workspace.sql:/docker-entrypoint-initdb.d/02-init-workspace.sql

volumes:
  postgres_storage: